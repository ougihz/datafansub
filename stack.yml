services:
  datafansub_prod:
    image: datafansub/frontend:prod-${PROD_GIT_SHA:-latest}
    networks:
      - datafansub_network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

networks:
  datafansub_network:
    external: true
    name: datafansub_network